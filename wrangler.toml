# site-pulse // Cloudflare Worker configuration
#
# Read-only proxy between atlas-systems.uk and Cloudflare's GraphQL
# Analytics API. Shares the api.atlas-systems.uk hostname with
# atlas-notify and github-pulse; this route is more specific
# (/site-pulse*) than atlas-notify's wildcard (/*), and Cloudflare
# always resolves to the most specific matching route, so this Worker
# correctly owns this path rather than atlas-notify intercepting it.
name = "site-pulse"
main = "src/index.js"
compatibility_date = "2026-06-17"
workers_dev = false

routes = [
  { pattern = "api.atlas-systems.uk/site-pulse*", zone_name = "atlas-systems.uk" }
]

[[kv_namespaces]]
binding = "PULSE_CACHE"
id = "REPLACE_WITH_NAMESPACE_ID"

[vars]
ZONE_TAG = "PASTE_YOUR_ZONE_ID_HERE"
CACHE_TTL_SECONDS = "3600"

[observability]
enabled = true

# Secret (never in this file, never in source):
#   npx wrangler secret put CLOUDFLARE_API_TOKEN
# For local dev, copy .dev.vars.example to .dev.vars instead.
