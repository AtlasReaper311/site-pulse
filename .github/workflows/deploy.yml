name: Deploy Worker

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  notify:
    name: Report to Discord
    needs: deploy
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Post result
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            COLOR=4906624; TITLE="Deploy succeeded: site-pulse"
          else
            COLOR=14830410; TITLE="Deploy failed: site-pulse"
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          curl -X POST "${{ secrets.DISCORD_API_DEPLOYS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "$TITLE" --arg color "$COLOR" \
              --arg sha "$SHORT_SHA" --arg url "$COMMIT_URL" \
              --arg actor "${{ github.actor }}" \
              '{username:"deploy-watch",embeds:[{title:$title,color:($color|tonumber),fields:[{name:"Commit",value:("["+$sha+"]("+$url+")")},{name:"Actor",value:$actor}],footer:{text:"Atlas Systems — Pipeline"}}]}')"
