name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: AtlasReaper311/atlas-infra/.github/workflows/deploy-worker.yml@main
    with:
      worker_name: site-pulse
      run_lint: true
    secrets: inherit
