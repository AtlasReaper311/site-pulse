name: Pull request CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker-validation:
    name: Worker validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install declared dependencies
        run: npm ci

      - name: Run offline validation
        run: |
          npm run lint
          npx wrangler deploy --dry-run --outdir "$RUNNER_TEMP/wrangler-dry-run"

      - name: Check out pinned Atlas Infra Worker contract validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: AtlasReaper311/atlas-infra
          ref: f971172dc258c93dffa53b8b7a3532c5be55883d
          path: .atlas-infra-contracts
          persist-credentials: false

      - name: Validate bundled Worker metadata contract
        run: |
          python3 .atlas-infra-contracts/scripts/worker_contract.py check \
            --bundle-dir "$RUNNER_TEMP/wrangler-dry-run" \
            --require-meta
